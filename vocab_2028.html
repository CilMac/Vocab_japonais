<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 — Cartes Voyage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&family=Crimson+Pro:ital,wght@1,300;1,400&family=Lato:wght@300;400&family=M+PLUS+Rounded+1c:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --ink-soft: #3d3530;
  --ink-faint: #7a6e68;
  --washi: #f7f3ec;
  --washi-dark: #ede7dc;
  --washi-mid: #e8dfd2;
  --red: #b5342a;
  --red-soft: #d9534f22;
  --gold: #c49a3c;
  --gold-soft: #c49a3c18;
  --teal: #2a7a6e;
  --teal-soft: #2a7a6e15;
  --navy: #1e3a5f;
  --navy-soft: #1e3a5f15;

  --theme-restaurant: #b5342a;
  --theme-transport: #1e3a5f;
  --theme-hotel: #2a7a6e;
  --theme-shopping: #7a4f1e;

  --font-jp: 'Noto Serif JP', serif;
  --font-jp-alt: 'M PLUS Rounded 1c', sans-serif;
  --font-title: 'Shippori Mincho', serif;
  --font-display: 'Crimson Pro', serif;
  --font-body: 'Lato', sans-serif;

  /* couleurs par type de contenu */
  --col-kanji:  #9b1c1c;
  --col-kana:   #1a5c2e;
  --col-romaji: #1a3a6e;
  --col-fr:     #1a1410;

  /* réglages utilisateur */
  --txt-scale: 1;        /* multiplicateur taille texte */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--washi);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Texture washi subtile */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(180,160,130,.03) 3px, rgba(180,160,130,.03) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(180,160,130,.02) 5px, rgba(180,160,130,.02) 6px);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 1;
  padding: 2.5rem 2rem 1.5rem;
  border-bottom: 1px solid var(--washi-mid);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.header-left {}

.title-jp {
  font-family: var(--font-jp);
  font-weight: 300;
  font-size: 2.2rem;
  color: var(--ink);
  letter-spacing: .08em;
  line-height: 1;
}

.title-sub {
  font-family: var(--font-display);
  font-size: 1.05rem;
  color: var(--ink-faint);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: .03em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mode-toggle {
  display: flex;
  background: var(--washi-dark);
  border-radius: 24px;
  padding: 3px;
  gap: 2px;
}

.mode-btn {
  padding: 6px 16px;
  border: none;
  background: transparent;
  border-radius: 20px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink-faint);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
}

.mode-btn.active {
  background: var(--washi);
  color: var(--ink);
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

/* ── THEME TABS ── */
.theme-nav {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--washi-mid);
  overflow-x: auto;
  scrollbar-width: none;
}

.theme-nav::-webkit-scrollbar { display: none; }

.theme-tab {
  flex-shrink: 0;
  padding: 1rem 1.5rem .9rem;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 13px;
  letter-spacing: .04em;
  color: var(--ink-faint);
  cursor: pointer;
  position: relative;
  transition: color .2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-tab::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 2px;
  background: var(--theme-color, var(--ink));
  transform: scaleX(0);
  transition: transform .2s;
}

.theme-tab.active { color: var(--ink); }
.theme-tab.active::after { transform: scaleX(1); }

.theme-icon { font-size: 16px; }

/* ── LEVEL STRIP ── */
.level-strip {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: .75rem 2rem;
  background: var(--washi-dark);
  border-bottom: 1px solid var(--washi-mid);
  flex-wrap: wrap;
}

.level-label {
  font-size: 12px;
  color: var(--ink-faint);
  letter-spacing: .06em;
  text-transform: uppercase;
}

.level-btns { display: flex; gap: 6px; }

.level-btn {
  padding: 4px 14px;
  border: 1px solid var(--washi-mid);
  border-radius: 20px;
  background: var(--washi);
  font-size: 12px;
  color: var(--ink-faint);
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-body);
  letter-spacing: .02em;
}

.level-btn.active {
  border-color: var(--ink-soft);
  color: var(--ink);
  background: var(--washi);
  font-weight: 400;
}

.stats-strip {
  margin-left: auto;
  display: flex;
  gap: 16px;
  align-items: center;
}

.stat { font-size: 12px; color: var(--ink-faint); }
.stat strong { color: var(--ink); font-weight: 400; }

/* ── MAIN ── */
main {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ── PROGRESS ── */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.75rem;
}

.progress-track {
  flex: 1;
  height: 2px;
  background: var(--washi-mid);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--ink-soft);
  border-radius: 2px;
  transition: width .4s ease;
}

.progress-text {
  font-size: 12px;
  color: var(--ink-faint);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* ── CARD ── */
.card-area {
  perspective: 1000px;
  margin-bottom: 1.25rem;
}

.card-inner {
  position: relative;
  width: 100%;
  padding-top: 54%;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}

.card-inner.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 16px;
  border: 1px solid var(--washi-mid);
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 10px;
  overflow: hidden;
}

.card-face::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--theme-color, var(--ink));
  opacity: .7;
}

.card-face.back {
  transform: rotateY(180deg);
  background: var(--washi);
}

.card-kana {
  font-family: var(--font-jp);
  font-weight: 400;
  font-size: clamp(1.1rem, 5vw, 4.5rem); /* taille de base — affinée en JS selon longueur */
  color: var(--col-kana);
  line-height: 1.25;
  text-align: center;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.card-kanji {
  font-family: var(--font-jp);
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  color: var(--col-kanji);
  font-weight: 400;
  text-align: center;
  margin-top: 2px;
}

.card-level-badge {
  position: absolute;
  top: 14px;
  right: 16px;
  font-size: 10px;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--ink-faint);
  background: var(--washi-dark);
  padding: 2px 9px;
  border-radius: 10px;
}

.card-theme-badge {
  position: absolute;
  top: 14px;
  left: 16px;
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--theme-color, var(--ink));
  opacity: .8;
}

.card-romaji {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--col-romaji);
  line-height: 1.25;
  text-align: center;
  max-width: 90%;
  word-break: break-word;
  scale: var(--txt-scale);
  transform-origin: center top;
}

.card-fr {
  font-size: clamp(.95rem, 2.8vw, 1.15rem);
  color: var(--col-fr);
  font-weight: 400;
  text-align: center;
  line-height: 1.45;
  max-width: 88%;
  scale: var(--txt-scale);
  transform-origin: center top;
}

.card-kana-small {
  font-family: var(--font-jp);
  font-size: 1.4rem;
  color: var(--col-kana);
  margin-top: 2px;
  text-align: center;
  scale: var(--txt-scale);
  transform-origin: center top;
}

.card-kanji {
  font-family: var(--font-jp);
  font-size: 1.1rem;
  color: var(--col-kanji);
  font-weight: 400;
  text-align: center;
  margin-top: 1px;
  scale: var(--txt-scale);
  transform-origin: center top;
}

/* ── MODALE RÉGLAGES ── */
.settings-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,20,16,.35);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.settings-overlay.open { display: flex; }

.settings-modal {
  background: var(--washi);
  border: 1px solid var(--washi-mid);
  border-radius: var(--border-radius-lg, 14px);
  padding: 2rem 2rem 1.5rem;
  width: min(420px, 92vw);
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  position: relative;
}

.settings-modal h3 {
  font-family: var(--font-title);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1.75rem;
  letter-spacing: .04em;
}

.settings-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  font-size: 20px;
  color: var(--ink-faint);
  cursor: pointer;
  line-height: 1;
  padding: 4px;
}
.settings-close:hover { color: var(--ink); }

.settings-row {
  margin-bottom: 1.5rem;
}

.settings-label {
  font-size: 12px;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: block;
  margin-bottom: .75rem;
}

/* Slider taille */
.settings-slider-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.settings-slider-wrap input[type=range] {
  flex: 1;
}
.settings-slider-val {
  font-size: 13px;
  color: var(--ink-soft);
  min-width: 32px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Toggle police JP */
.font-toggle {
  display: flex;
  gap: 10px;
}
.font-opt {
  flex: 1;
  padding: 12px 8px;
  border: 1px solid var(--washi-mid);
  border-radius: 10px;
  background: var(--washi);
  cursor: pointer;
  text-align: center;
  transition: all .18s;
}
.font-opt span {
  font-size: 1.3rem;
  display: block;
  margin-bottom: 4px;
  line-height: 1.2;
}
.font-opt small {
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.font-opt.active {
  border-color: var(--ink-soft);
  background: var(--washi-dark);
}
.font-opt.active small { color: var(--ink); }

/* Bouton ⚙ dans le header */
.btn-settings {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--washi-mid);
  background: var(--washi);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-faint);
  transition: all .18s;
  margin-left: 6px;
}
.btn-settings:hover { border-color: var(--ink-soft); color: var(--ink); }

.tap-hint {
  text-align: center;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: .05em;
  margin-bottom: 1rem;
}

/* ── CONTROLS ── */
.card-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 1.25rem;
}

.ctrl-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--washi-mid);
  background: var(--washi);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all .18s;
  color: var(--ink-faint);
  letter-spacing: .02em;
}

.ctrl-btn:hover { background: var(--washi-dark); color: var(--ink); }

.ctrl-btn.bad {
  border-color: #e0c4c4;
  color: var(--red);
}

.ctrl-btn.bad:hover { background: var(--red-soft); }

.ctrl-btn.good {
  border-color: #b8d4c4;
  color: var(--teal);
}

.ctrl-btn.good:hover { background: var(--teal-soft); }

.ctrl-btn.flip-btn {
  border-color: var(--ink-soft);
  color: var(--ink);
  background: var(--washi);
}

/* ── QUIZ MODE ── */
.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.25rem;
}

.quiz-opt {
  padding: 14px 12px;
  border-radius: 10px;
  border: 1px solid var(--washi-mid);
  background: var(--washi);
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: all .18s;
  color: var(--ink);
  text-align: center;
  line-height: 1.3;
}

.quiz-opt:hover:not(:disabled) { background: var(--washi-dark); border-color: var(--ink-soft); }

.quiz-opt.correct {
  background: #eef6f0;
  border-color: #7fba9a;
  color: #1e5e36;
}

.quiz-opt.wrong {
  background: #fdf0f0;
  border-color: #e0a0a0;
  color: #8b2020;
}

.quiz-opt:disabled { cursor: default; }

/* ── DONE SCREEN ── */
.done-screen {
  text-align: center;
  padding: 3rem 1rem;
  display: none;
}

.done-screen.visible { display: block; }

.done-jp {
  font-family: var(--font-jp);
  font-size: 2rem;
  font-weight: 300;
  color: var(--ink-faint);
  margin-bottom: 1rem;
}

.done-score {
  font-family: var(--font-display);
  font-size: 5rem;
  color: var(--ink);
  line-height: 1;
  margin-bottom: .25rem;
}

.done-label {
  font-size: .9rem;
  color: var(--ink-faint);
  letter-spacing: .05em;
  margin-bottom: 2rem;
}

.done-msg {
  font-size: 1rem;
  color: var(--ink-soft);
  margin-bottom: 2rem;
  line-height: 1.6;
}

.restart-btn {
  padding: 12px 32px;
  border: 1px solid var(--ink-soft);
  border-radius: 24px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .2s;
}

.restart-btn:hover { background: var(--ink); color: var(--washi); }

/* ── WORD LIST (mode révision) ── */
.word-list {
  display: block;
}

.wl-group { margin-bottom: 2.5rem; }

.wl-group-title {
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: .5rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.wl-group-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--washi-mid);
}

/* Grille : kana+kanji | romaji+fr | badge | audio */
.wl-item {
  display: grid;
  grid-template-columns: minmax(0,2fr) minmax(0,3fr) 5rem 2rem;
  align-items: center;
  gap: 0 16px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--washi-mid);
  transition: background .15s;
  cursor: default;
}

.wl-item:first-of-type { border-top: 1px solid var(--washi-mid); }
.wl-item:hover { background: var(--washi-dark); }

/* Colonne 1 : kana + kanji empilés */
.wl-col-jp {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}

.wl-kana {
  font-family: var(--font-jp);
  font-size: 1rem;
  color: var(--col-kana);
  white-space: normal;
  line-height: 1.4;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.wl-kanji {
  font-family: var(--font-jp);
  font-size: .82rem;
  color: var(--col-kanji);
  white-space: normal;
  line-height: 1.3;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

/* Colonne 2 : romaji + français empilés */
.wl-col-fr {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.wl-romaji {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 300;
  font-size: .95rem;
  color: var(--col-romaji);
  line-height: 1.3;
  overflow-wrap: anywhere;
}

.wl-fr {
  font-size: .82rem;
  color: var(--col-fr);
  line-height: 1.35;
  overflow-wrap: anywhere;
}

/* Colonne 3 : badge niveau */
.wl-lvl {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--washi-mid);
  color: var(--ink-faint);
  white-space: nowrap;
  letter-spacing: .03em;
  text-align: center;
  justify-self: start;
}

/* ── NAV ARROWS ── */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: .5rem;
}

.nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--washi-mid);
  background: var(--washi);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-faint);
  transition: all .18s;
}

.nav-btn:hover { border-color: var(--ink-soft); color: var(--ink); }

.nav-count {
  font-size: 13px;
  color: var(--ink-faint);
  min-width: 60px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

/* séparateur vertical */
.sep { width: 1px; height: 14px; background: var(--washi-mid); }

/* ── BOUTON AUDIO ── */
.btn-audio {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--washi-mid);
  background: var(--washi);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  color: var(--ink-faint);
  transition: all .18s;
  flex-shrink: 0;
  padding: 0;
  line-height: 1;
}
.btn-audio:hover { border-color: var(--ink-soft); color: var(--ink); background: var(--washi-dark); }
.btn-audio.playing { border-color: var(--teal); color: var(--teal); }
.card-audio-btn {
  position: absolute;
  bottom: 14px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--washi-mid);
  background: var(--washi);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  color: var(--ink-faint);
  transition: all .18s;
  padding: 0;
}
.card-audio-btn:hover { border-color: var(--teal); color: var(--teal); }

@media (max-width: 480px) {
  header { padding: 1.5rem 1rem 1rem; }
  .title-jp { font-size: 1.7rem; }
  main { padding: 1.5rem 1rem 3rem; }
  .quiz-options { grid-template-columns: 1fr; }
  .wl-item { grid-template-columns: minmax(0,1fr) minmax(0,1.5fr) auto; }
  .wl-lvl { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="title-jp">日本語 旅行</div>
    <div class="title-sub">Vocabulaire voyage — Hiragana</div>
  </div>
  <div class="header-right">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-mode-flash" onclick="setMode('flash')">Cartes</button>
      <button class="mode-btn" id="btn-mode-quiz" onclick="setMode('quiz')">Quiz</button>
      <button class="mode-btn" id="btn-mode-list" onclick="setMode('list')">Liste</button>
    </div>
    <button class="btn-settings" onclick="openSettings()" title="Réglages">⚙</button>

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentTheme = 'all';
let currentLevel = 'all';
let currentMode  = 'flash';
let deck = [];
let idx  = 0;
let isFlipped = false;
let okCount = 0;
let koCount = 0;
// quiz
let qDeck = [];
let qIdx  = 0;
let qOk   = 0;
let qKo   = 0;

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
function init() {
  buildThemeNav();
  setTheme('all');
}

function buildThemeNav() {
  const nav = document.getElementById('theme-nav');
  nav.innerHTML = '';
  THEMES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'theme-tab' + (t.id === currentTheme ? ' active' : '');
    btn.style.setProperty('--theme-color', t.color);
    btn.innerHTML = `<span class="theme-icon">${t.icon}</span>${t.label}`;
    btn.onclick = () => setTheme(t.id);
    nav.appendChild(btn);
  });
}

function setTheme(id) {
  currentTheme = id;
  buildThemeNav();
  const color = THEMES.find(t=>t.id===id).color;
  document.documentElement.style.setProperty('--theme-color', color);
  if(currentMode === 'list') buildList();
  else buildDeck();
}

function setLevel(l) {
  currentLevel = l;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('lvl-' + l).classList.add('active');
  if(currentMode === 'list') buildList();
  else buildDeck();
}

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-mode-' + m).classList.add('active');
  document.getElementById('flash-mode').style.display = m === 'flash' ? '' : 'none';
  document.getElementById('quiz-mode').style.display  = m === 'quiz'  ? '' : 'none';
  document.getElementById('list-mode').style.display  = m === 'list'  ? '' : 'none';
  if(m === 'list') buildList();
  else buildDeck();
}

function buildDeck() {
  let filtered = currentTheme === 'all'
    ? CARDS.slice()
    : CARDS.filter(c => c.theme === currentTheme);
  if(currentLevel !== 'all') filtered = filtered.filter(c => c.level === parseInt(currentLevel));
  deck = shuffle(filtered);
  idx = 0; okCount = 0; koCount = 0; isFlipped = false;
  updateStats();
  if(currentMode === 'flash') {
    document.getElementById('done-screen').classList.remove('visible');
    showCard();
  } else if(currentMode === 'quiz') {
    qDeck = shuffle(filtered); qIdx = 0; qOk = 0; qKo = 0;
    document.getElementById('q-done-screen').classList.remove('visible');
    document.getElementById('quiz-options').style.display = 'grid';
    showQuizCard();
  }
}

function shuffle(arr) { return arr.slice().sort(() => Math.random() - .5); }

// Taille de police adaptive selon longueur du kana
function kanaFontSize(text) {
  const len = text.replace(/[〜～]/g, '').length;
  if (len <= 4)  return 'clamp(2.8rem, 8vw, 4.5rem)';
  if (len <= 8)  return 'clamp(2rem,   6vw, 3.2rem)';
  if (len <= 14) return 'clamp(1.5rem, 4vw, 2.2rem)';
  if (len <= 20) return 'clamp(1.2rem, 3vw, 1.7rem)';
  return 'clamp(1rem, 2.5vw, 1.4rem)';
}

function kanaSmallFontSize(text) {
  const len = text.replace(/[〜～]/g, '').length;
  if (len <= 4)  return '1.6rem';
  if (len <= 8)  return '1.35rem';
  if (len <= 14) return '1.2rem';
  if (len <= 20) return '1.05rem';
  return '.95rem';
}

function romajiSize(text) {
  const len = text.length;
  if (len <= 8)  return '2.2rem';
  if (len <= 16) return '1.9rem';
  if (len <= 26) return '1.6rem';
  if (len <= 38) return '1.35rem';
  return '1.2rem';
}

// ═══════════════════════════════════════
//  FLASH MODE
// ═══════════════════════════════════════
function showCard() {
  if(deck.length === 0) return;
  if(idx >= deck.length) { showDone(); return; }
  const c = deck[idx];
  const ci = document.getElementById('card-inner');
  ci.classList.remove('flipped');
  isFlipped = false;

  const themeColor = THEMES.find(t=>t.id===c.theme).color;
  const themeLabel = THEMES.find(t=>t.id===c.theme).label;

  const fs = kanaFontSize(c.kana);

  document.getElementById('card-front').innerHTML = `
    <span class="card-theme-badge">${themeLabel}</span>
    <span class="card-level-badge">${c.level === 1 ? 'Débutant' : c.level === 2 ? 'Intermédiaire' : 'Avancé'}</span>
    <div class="card-kana" style="font-size:${fs}">${c.kana}</div>
    ${c.kanji && c.kanji !== c.kana ? `<div class="card-kanji">${c.kanji}</div>` : ''}
    <button class="card-audio-btn" title="Écouter" onclick="event.stopPropagation();speakJP('${c.kana.replace(/'/g,"\\'")}',this)">♪</button>
  `;
  document.getElementById('card-front').style.setProperty('--theme-color', themeColor);

  document.getElementById('card-back').innerHTML = `
    <span class="card-theme-badge">${themeLabel}</span>
    <div class="card-romaji" style="font-size:${romajiSize(c.romaji)}">${c.romaji}</div>
    <div class="card-fr">${c.fr}</div>
    <div class="card-kana-small" style="font-size:${kanaSmallFontSize(c.kana)}">${c.kana}</div>
    ${c.kanji && c.kanji !== c.kana ? `<div class="card-kanji">${c.kanji}</div>` : ''}
    <button class="card-audio-btn" title="Écouter" onclick="event.stopPropagation();speakJP('${c.kana.replace(/'/g,"\\'")}',this)">♪</button>
  `;
  document.getElementById('card-back').style.setProperty('--theme-color', themeColor);

  document.getElementById('ctrl-flip').style.display = 'flex';
  document.getElementById('ctrl-answer').style.display = 'none';
  document.getElementById('tap-hint').textContent = 'Cliquez pour retourner';

  const pct = Math.round((idx / deck.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = (idx+1) + ' / ' + deck.length;
  document.getElementById('nav-count').textContent = (idx+1) + ' / ' + deck.length;
  updateStats();
}

function flipCard() {
  if(deck.length === 0 || idx >= deck.length) return;
  const ci = document.getElementById('card-inner');
  if(!isFlipped) {
    ci.classList.add('flipped');
    isFlipped = true;
    document.getElementById('ctrl-flip').style.display = 'none';
    document.getElementById('ctrl-answer').style.display = 'flex';
    document.getElementById('tap-hint').textContent = 'Tu te souvenais ?';
    // Énonciation automatique au retournement
    if(deck[idx]) speakJP(deck[idx].kana);
  }
}

function answer(ok) {
  if(ok) okCount++; else koCount++;
  idx++;
  updateStats();
  showCard();
}

function prevCard() {
  if(idx > 0) { idx--; showCard(); }
}

function nextCard() {
  if(idx < deck.length - 1) { idx++; isFlipped = false; showCard(); }
  else showDone();
}

function showDone() {
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('ctrl-flip').style.display = 'none';
  document.getElementById('ctrl-answer').style.display = 'none';
  document.getElementById('prog-bar').style.width = '100%';
  const total = okCount + koCount;
  const pct = total > 0 ? Math.round((okCount / total) * 100) : 0;
  document.getElementById('done-pct').textContent = pct + '%';
  const msgs = {
    high: ['素晴らしい！ — Excellent travail, vous maîtrisez ce thème !', 'すごい！ — Impressionnant, continuez comme ça !'],
    mid:  ['がんばれ！ — Bien, encore un peu de pratique et vous y êtes.', 'もう少し！ — Presque là, relancez pour consolider.'],
    low:  ['また練習してください — Revoyez ce thème, la pratique paie !', 'ファイト！ — Courage, recommencez pour progresser.'],
  };
  const bucket = pct >= 80 ? 'high' : pct >= 50 ? 'mid' : 'low';
  document.getElementById('done-msg').textContent = msgs[bucket][Math.floor(Math.random()*2)];
}

function restart() {
  document.getElementById('done-screen').classList.remove('visible');
  buildDeck();
}

// ═══════════════════════════════════════
//  QUIZ MODE
// ═══════════════════════════════════════
function showQuizCard() {
  if(qIdx >= qDeck.length) { showQDone(); return; }
  const c = qDeck[qIdx];
  const themeColor = THEMES.find(t=>t.id===c.theme).color;
  document.getElementById('q-card-front').innerHTML = `
    <span class="card-theme-badge">${THEMES.find(t=>t.id===c.theme).label}</span>
    <span class="card-level-badge">${c.level===1?'Débutant':c.level===2?'Intermédiaire':'Avancé'}</span>
    <div class="card-kana" style="font-size:${kanaFontSize(c.kana)}">${c.kana}</div>
    ${c.kanji && c.kanji !== c.kana ? `<div class="card-kanji">${c.kanji}</div>` : ''}
    <button class="card-audio-btn" title="Écouter" onclick="event.stopPropagation();speakJP('${c.kana.replace(/'/g,"\\'")}',this)">♪</button>
  `;
  document.getElementById('q-card-front').style.setProperty('--theme-color', themeColor);

  // 3 mauvaises réponses (même thème si possible)
  let pool = qDeck.filter((_,i) => i !== qIdx);
  if(pool.length < 3) pool = CARDS.filter(card => card !== c);
  const wrong = shuffle(pool).slice(0,3);
  const opts = shuffle([c, ...wrong]);

  const container = document.getElementById('quiz-options');
  container.innerHTML = '';
  container.style.display = 'grid';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.innerHTML = `<strong style="color:var(--col-romaji)">${opt.romaji}</strong><br><span style="font-size:12px;color:var(--col-fr)">${opt.fr}</span>`;
    btn.onclick = () => selectQuizOpt(btn, opt === c);
    container.appendChild(btn);
  });

  const pct = Math.round((qIdx / qDeck.length) * 100);
  document.getElementById('q-prog-bar').style.width = pct + '%';
  document.getElementById('q-prog-text').textContent = (qIdx+1) + ' / ' + qDeck.length;
}

function selectQuizOpt(btn, correct) {
  document.querySelectorAll('.quiz-opt').forEach(b => { b.disabled = true; });
  btn.classList.add(correct ? 'correct' : 'wrong');
  if(!correct) {
    // montrer la bonne
    document.querySelectorAll('.quiz-opt').forEach(b => {
      if(!b.classList.contains('wrong')) b.classList.add('correct');
    });
    qKo++;
  } else { qOk++; }
  document.getElementById('stat-ok').textContent = qOk;
  document.getElementById('stat-ko').textContent = qKo;
  setTimeout(() => { qIdx++; showQuizCard(); }, 900);
}

function showQDone() {
  document.getElementById('q-done-screen').classList.add('visible');
  document.getElementById('quiz-options').style.display = 'none';
  const total = qOk + qKo;
  const pct = total > 0 ? Math.round((qOk/total)*100) : 0;
  document.getElementById('q-done-pct').textContent = pct + '%';
  document.getElementById('q-done-msg').textContent = pct >= 80
    ? '素晴らしい！ — Vous êtes prêt(e) pour le voyage !'
    : pct >= 50 ? 'がんばれ！ — Encore un peu, vous progressez !'
    : 'ファイト！ — Recommencez pour ancrer le vocabulaire.';
  document.getElementById('q-prog-bar').style.width = '100%';
}

function qRestart() {
  document.getElementById('q-done-screen').classList.remove('visible');
  buildDeck();
}

// ═══════════════════════════════════════
//  MODE LISTE
// ═══════════════════════════════════════
function buildList() {
  const container = document.getElementById('list-mode');
  let filtered = currentTheme === 'all'
    ? CARDS.slice()
    : CARDS.filter(c => c.theme === currentTheme);
  if(currentLevel !== 'all') filtered = filtered.filter(c => c.level === parseInt(currentLevel));

  container.innerHTML = '';

  // En mode "tout", on regroupe par thème puis par niveau
  const groupKeys = currentTheme === 'all'
    ? THEMES.filter(t => !t.isAll).map(t => t.id)
    : [currentTheme];

  groupKeys.forEach(tid => {
    const themeCards = filtered.filter(c => c.theme === tid);
    if(!themeCards.length) return;
    const themeObj = THEMES.find(t => t.id === tid);

    if(currentTheme === 'all') {
      const header = document.createElement('div');
      header.style.cssText = `font-size:13px;font-weight:500;color:${themeObj.color};margin:1.5rem 0 .5rem;letter-spacing:.04em;display:flex;align-items:center;gap:8px;`;
      header.innerHTML = `<span>${themeObj.icon}</span>${themeObj.label}`;
      container.appendChild(header);
    }

    [1,2,3].forEach(lv => {
      const group = themeCards.filter(c => c.level === lv);
      if(!group.length) return;
      const div = document.createElement('div');
      div.className = 'wl-group';
      div.innerHTML = `<div class="wl-group-title">${lv===1?'Débutant — mots isolés':lv===2?'Intermédiaire — phrases courtes':'Avancé — expressions complexes'}</div>`;
      group.forEach(c => {
        const row = document.createElement('div');
        row.className = 'wl-item';
        row.innerHTML = `
          <div class="wl-col-jp">
            <div class="wl-kana">${c.kana}</div>
            ${c.kanji && c.kanji !== c.kana ? `<div class="wl-kanji">${c.kanji}</div>` : ''}
          </div>
          <div class="wl-col-fr">
            <div class="wl-romaji">${c.romaji}</div>
            <div class="wl-fr">${c.fr}</div>
          </div>
          <div class="wl-lvl">${lv===1?'débutant':lv===2?'inter.':'avancé'}</div>
          <button class="btn-audio" title="Écouter en japonais" onclick="speakJP('${c.kana.replace(/'/g,"\\'")}', this)">♪</button>
        `;
        div.appendChild(row);
      });
      container.appendChild(div);
    });
  });
  updateStats();
}
// ═══════════════════════════════════════
function updateStats() {
  const filtered = CARDS.filter(c => {
    if(currentTheme !== 'all' && c.theme !== currentTheme) return false;
    if(currentLevel !== 'all' && c.level !== parseInt(currentLevel)) return false;
    return true;
  });
  document.getElementById('stat-ok').textContent = okCount;
  document.getElementById('stat-ko').textContent = koCount;
  document.getElementById('stat-total').textContent = filtered.length + ' cartes';
}

// ═══════════════════════════════════════
//  AUDIO TTS
// ═══════════════════════════════════════
function speakJP(text, btn) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1;

  // Chercher une voix japonaise disponible
  const voices = window.speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang.startsWith('ja'));
  if(jpVoice) utter.voice = jpVoice;

  if(btn) {
    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
    utter.onerror = () => btn.classList.remove('playing');
  }
  window.speechSynthesis.speak(utter);
}

// Précharger les voix dès que possible
if(window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ═══════════════════════════════════════
//  RÉGLAGES
// ═══════════════════════════════════════
let currentJPFont = 'serif';

function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
function overlayClick(e) {
  if(e.target === document.getElementById('settings-overlay')) closeSettings();
}

function applyTxtScale(val) {
  document.documentElement.style.setProperty('--txt-scale', val / 100);
  document.getElementById('txt-scale-val').textContent = val + '%';
}

function setJPFont(choice) {
  currentJPFont = choice;
  const font = choice === 'round'
    ? "'M PLUS Rounded 1c', sans-serif"
    : "'Noto Serif JP', serif";
  document.documentElement.style.setProperty('--font-jp', font);
  document.getElementById('font-opt-serif').classList.toggle('active', choice === 'serif');
  document.getElementById('font-opt-round').classList.toggle('active', choice === 'round');
}

init();
</script>
